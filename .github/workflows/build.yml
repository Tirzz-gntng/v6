name: Build Flutter APK

on:
  workflow_dispatch:
    inputs:
      zip_url:
        description: "URL download ZIP project Flutter"
        required: true
      tag:
        description: "Tag build"
        required: true
      build_type:
        description: "debug / release"
        required: true
        default: "release"
      only_analyze:
        description: "Hanya jalankan analyze (true/false)"
        required: false
        default: "false"
      auto_fix:
        description: "Aktifkan Auto-Fix Builder (true/false)"
        required: false
        default: "false"
      fix_category:
        description: "Kategori error (dari autofix.js), kosong = tidak ada"
        required: false
        default: ""
      template_url:
        description: "Raw GitHub URL template fix yang sudah divalidasi (lihat templates.js), kosong = pakai fallback bawaan"
        required: false
        default: ""

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    
    steps:
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Download ZIP project
        run: |
          AUTO_FIX="${{ github.event.inputs.auto_fix }}"
          URL="${{ github.event.inputs.zip_url }}"
          UA_LIST=("FlutterBuildBot/1.0" "Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36" "curl/8.0")
          SUCCESS=false

          if [ "$AUTO_FIX" = "true" ]; then
            MAX_TRY=3
          else
            MAX_TRY=1
          fi

          for i in $(seq 1 $MAX_TRY); do
            UA="${UA_LIST[$((i-1))]}"
            echo "=== [AUTO-FIX] Percobaan $i/$MAX_TRY — User-Agent: $UA ==="

            EXTRA_FLAGS=""
            if [ "$AUTO_FIX" = "true" ] && [ "$i" -gt 1 ]; then
              echo "⚠️ [AUTO-FIX] Percobaan sebelumnya gagal, tambahkan --insecure (bypass SSL, mode development)"
              EXTRA_FLAGS="-k"
            fi

            HTTP_CODE=$(curl -L $EXTRA_FLAGS \
              -A "$UA" \
              -H "Authorization: Bearer ${{ secrets.GH_TOKEN }}" \
              -H "Accept: application/octet-stream" \
              "$URL" \
              -o project.zip \
              -w "%{http_code}" \
              --connect-timeout 15 --max-time 90 || echo "000")

            echo "HTTP Status: $HTTP_CODE"

            if [ "$HTTP_CODE" = "200" ] && file project.zip | grep -qi "zip"; then
              SUCCESS=true
              echo "✅ Download berhasil pada percobaan $i"
              break
            fi

            echo "❌ Percobaan $i gagal (HTTP $HTTP_CODE), coba lagi..."
            sleep 2
          done

          echo ""
          echo "=== File Info ==="
          ls -lh project.zip || true
          echo ""
          echo "=== File Type ==="
          file project.zip || true
          echo ""
          echo "=== First Bytes ==="
          xxd project.zip 2>/dev/null | head -2 || true

          if [ "$SUCCESS" != "true" ]; then
            echo "❌ Semua percobaan download gagal."
            exit 1
          fi

      - name: Extract ZIP
        run: |
          echo "=== Validating ZIP ==="
          if ! unzip -t project.zip > /dev/null 2>&1; then
            echo "❌ File bukan ZIP valid!"
            echo ""
            echo "=== Isi file ==="
            cat project.zip
            exit 1
          fi
          echo "✅ ZIP valid"

          echo ""
          echo "=== Extracting ZIP ==="
          unzip -q project.zip -d project_raw

          echo ""
          echo "=== Mengunci Project Dir ==="
          SUB_DIR_COUNT=$(find project_raw -maxdepth 1 -mindepth 1 -type d | wc -l)
          FILE_COUNT=$(find project_raw -maxdepth 1 -mindepth 1 -type f | wc -l)
          
          if [ "$SUB_DIR_COUNT" -eq 1 ] && [ "$FILE_COUNT" -eq 0 ]; then
            PROJECT_DIR=$(find project_raw -maxdepth 1 -mindepth 1 -type d | head -n 1)
          else
            PROJECT_DIR="project_raw"
          fi
          echo "PROJECT_DIR=$PROJECT_DIR" >> $GITHUB_ENV

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Setup Flutter
        uses: subosito/flutter-action@main
        with:
          flutter-version: "3.41.9"
          channel: "stable"
          cache: true

      - name: "Auto-Fix: Manifest & Resource Check"
        if: ${{ github.event.inputs.auto_fix == 'true' }}
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          echo "=== [AUTO-FIX] Cek AndroidManifest.xml ==="
          MANIFEST_PATH="android/app/src/main/AndroidManifest.xml"
          FIX_CATEGORY="${{ github.event.inputs.fix_category }}"
          TEMPLATE_URL="${{ github.event.inputs.template_url }}"

          if [ -f "$MANIFEST_PATH" ]; then
            if ! xmllint --noout "$MANIFEST_PATH" 2>/tmp/manifest_err.txt; then
              echo "❌ Manifest tidak valid."
              cat /tmp/manifest_err.txt

              PKG_NAME=$(grep -o 'package="[^"]*"' "$MANIFEST_PATH" 2>/dev/null | head -1 | sed 's/package="//;s/"//')
              if [ -z "$PKG_NAME" ]; then PKG_NAME="com.example.app"; fi

              if [ "$FIX_CATEGORY" = "MANIFEST_ERROR" ] && [ -n "$TEMPLATE_URL" ]; then
                echo "🔧 [AUTO-FIX] Ambil template AndroidManifest.xml dari GitHub: $TEMPLATE_URL"
                if curl -fsSL "$TEMPLATE_URL" -o /tmp/manifest_template.xml && [ -s /tmp/manifest_template.xml ]; then
                  sed "s/{{PACKAGE_NAME}}/$PKG_NAME/g" /tmp/manifest_template.xml > "$MANIFEST_PATH"
                  echo "✅ AndroidManifest.xml diganti dari template GitHub."
                else
                  echo "⚠️ Gagal ambil template dari GitHub, pakai fallback bawaan..."
                  FIX_CATEGORY="" # trigger fallback di bawah
                fi
              fi

              if [ "$FIX_CATEGORY" != "MANIFEST_ERROR" ] || [ -z "$TEMPLATE_URL" ]; then
              cat > "$MANIFEST_PATH" << MANIFEST_EOF
          <manifest xmlns:android="http://schemas.android.com/apk/res/android" package="$PKG_NAME">
              <application
                  android:label="app"
                  android:name="${android.app.Application}"
                  android:icon="@mipmap/ic_launcher">
                  <activity
                      android:name=".MainActivity"
                      android:exported="true"
                      android:launchMode="singleTop"
                      android:theme="@style/LaunchTheme"
                      android:configChanges="orientation|keyboardHidden|keyboard|screenSize|smallestScreenSize|locale|layoutDirection|fontScale|screenLayout|density|uiMode"
                      android:windowSoftInputMode="adjustResize">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                  </activity>
                  <meta-data android:name="flutterEmbedding" android:value="2"/>
              </application>
          </manifest>
          MANIFEST_EOF
              echo "✅ AndroidManifest.xml berhasil di-regenerate (fallback bawaan)."
              fi
            else
              echo "✅ Manifest valid."
            fi
          else
            echo "ℹ️ Manifest tidak ditemukan di path default, skip."
          fi

          echo ""
          echo "=== [AUTO-FIX] Cek Resource (assets/fonts) yang hilang ==="
          if [ -f "pubspec.yaml" ]; then
            PLACEHOLDER_PNG_B64="iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mNk+A8AAQUBAScY42YAAAAASUVORK5CYII="
            SYS_FONT=$(find /usr/share/fonts -name "*.ttf" 2>/dev/null | head -1)

            grep -E '^\s+- ' pubspec.yaml | sed -E 's/^\s+-\s*//; s/\s*#.*//' | while read -r ASSET_PATH; do
              if [ -z "$ASSET_PATH" ] || [ -f "$ASSET_PATH" ]; then continue; fi
              case "$ASSET_PATH" in
                *.png|*.jpg|*.jpeg|*.webp)
                  mkdir -p "$(dirname "$ASSET_PATH")"
                  echo "$PLACEHOLDER_PNG_B64" | base64 -d > "$ASSET_PATH"
                  echo "🖼️ Placeholder gambar dibuat: $ASSET_PATH"
                  ;;
                *.ttf|*.otf)
                  mkdir -p "$(dirname "$ASSET_PATH")"
                  if [ -n "$SYS_FONT" ]; then
                    cp "$SYS_FONT" "$ASSET_PATH"
                  else
                    touch "$ASSET_PATH"
                  fi
                  echo "🔤 Placeholder font dibuat: $ASSET_PATH (best-effort, cek visual manual)"
                  ;;
                *.svg)
                  mkdir -p "$(dirname "$ASSET_PATH")"
                  echo '<svg xmlns="http://www.w3.org/2000/svg" width="1" height="1"></svg>' > "$ASSET_PATH"
                  echo "🖼️ Placeholder SVG dibuat: $ASSET_PATH"
                  ;;
              esac
            done
          fi

      - name: Analyze Project Code
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          if [ -f "pubspec.yaml" ]; then
            flutter analyze > analyze_report.txt 2>&1 || true
            echo "[RESULT_ANALYZE]"
            cat analyze_report.txt
            echo "[END_RESULT_ANALYZE]"
            rm -f analyze_report.txt
          else
            echo "[RESULT_ANALYZE]"
            echo "❌ pubspec.yaml tidak ditemukan."
            echo "[END_RESULT_ANALYZE]"
          fi

      - name: Stop if Analyze Only
        if: ${{ github.event.inputs.only_analyze == 'true' }}
        run: exit 1

      - name: Get dependencies
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          if [ -f "pubspec.yaml" ]; then
            if timeout 120s flutter pub get 2>pub_get_err.txt; then
              echo "✅ pub get sukses."
            else
              cat pub_get_err.txt
              if [ "${{ github.event.inputs.auto_fix }}" = "true" ]; then
                echo "⚠️ [AUTO-FIX] pub get gagal (kemungkinan version solving conflict)."

                if [ "${{ github.event.inputs.fix_category }}" = "DEPENDENCY_ERROR" ] && [ -n "${{ github.event.inputs.template_url }}" ]; then
                  echo "🔧 [AUTO-FIX] Ambil template pubspec.yaml dari GitHub: ${{ github.event.inputs.template_url }}"
                  if curl -fsSL "${{ github.event.inputs.template_url }}" -o /tmp/pubspec.template.yaml && [ -s /tmp/pubspec.template.yaml ]; then
                    cp pubspec.yaml pubspec.yaml.bak
                    cp /tmp/pubspec.template.yaml pubspec.yaml
                    echo "✅ pubspec.yaml diganti dari template GitHub (backup: pubspec.yaml.bak)."
                  else
                    echo "⚠️ Gagal ambil template pubspec.yaml, lanjut ke fallback bawaan..."
                  fi
                fi

                echo "🔧 [AUTO-FIX] Mencoba 'flutter pub upgrade --major-versions'..."
                if timeout 150s flutter pub upgrade --major-versions 2>pub_upgrade_err.txt; then
                  echo "✅ [AUTO-FIX] pub upgrade --major-versions berhasil."
                else
                  cat pub_upgrade_err.txt
                  echo "🔧 [AUTO-FIX] Masih gagal, fallback: hapus pubspec.lock lalu pub get ulang..."
                  rm -f pubspec.lock
                  timeout 120s flutter pub get || echo "⚠️ [AUTO-FIX] Tetap gagal, lanjut ke build (akan tercatat sebagai fail)."
                fi
              else
                echo "⚠️ Lanjut tanpa auto-fix (auto_fix=false)..."
              fi
            fi
            rm -f pub_get_err.txt pub_upgrade_err.txt
          fi

      - name: "Auto-Fix: Gradle/AGP/Kotlin Compatibility Patch"
        if: ${{ github.event.inputs.auto_fix == 'true' }}
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          echo "=== [AUTO-FIX] Patch kompatibilitas Gradle/AGP/Kotlin ==="
          FIX_CATEGORY="${{ github.event.inputs.fix_category }}"
          TEMPLATE_URL="${{ github.event.inputs.template_url }}"

          if [ "$FIX_CATEGORY" = "GRADLE_SDK_ERROR" ] && [ -n "$TEMPLATE_URL" ] && [ -f "android/app/build.gradle" ]; then
            echo "🔧 [AUTO-FIX] Ambil template build.gradle dari GitHub: $TEMPLATE_URL"
            if curl -fsSL "$TEMPLATE_URL" -o /tmp/build.gradle.template && [ -s /tmp/build.gradle.template ]; then
              cp android/app/build.gradle android/app/build.gradle.bak
              cp /tmp/build.gradle.template android/app/build.gradle
              echo "✅ android/app/build.gradle diganti dari template GitHub (backup: build.gradle.bak)."
            else
              echo "⚠️ Gagal ambil template build.gradle dari GitHub, lanjut ke patch versi (fallback bawaan)..."
            fi
          fi

          echo ""
          echo "=== [AUTO-FIX] Patch versi AGP/Gradle/Kotlin (fallback bawaan, selalu dijalankan sebagai jaring pengaman) ==="

          SETTINGS_GRADLE="android/settings.gradle"
          SETTINGS_GRADLE_KTS="android/settings.gradle.kts"
          WRAPPER_PROPS="android/gradle/wrapper/gradle-wrapper.properties"
          APP_BUILD_GRADLE="android/app/build.gradle"
          APP_BUILD_GRADLE_KTS="android/app/build.gradle.kts"

          if [ -f "$WRAPPER_PROPS" ]; then
            sed -i -E 's|distributionUrl=.*|distributionUrl=https\\://services.gradle.org/distributions/gradle-8.9-all.zip|' "$WRAPPER_PROPS"
            echo "✅ gradle-wrapper.properties dipatch ke Gradle 8.9"
          fi

          for F in "$SETTINGS_GRADLE" "$SETTINGS_GRADLE_KTS"; do
            if [ -f "$F" ]; then
              sed -i -E "s/(com\.android\.(application|library)['\"]? version ['\"])[0-9.]+/\18.6.0/" "$F"
              echo "✅ AGP dipatch ke 8.6.0 di $F"
            fi
          done

          for F in "$SETTINGS_GRADLE" "$SETTINGS_GRADLE_KTS"; do
            if [ -f "$F" ]; then
              sed -i -E "s/(org\.jetbrains\.kotlin\.android['\"]? version ['\"])[0-9.]+/\12.1.0/" "$F"
              echo "✅ Kotlin plugin dipatch ke 2.1.0 di $F"
            fi
          done

          if grep -rq "font_awesome_flutter" pubspec.yaml 2>/dev/null; then
            echo "🔧 font_awesome_flutter terdeteksi, pin ke versi yang kompatibel dengan IconData final class..."
            sed -i -E 's/font_awesome_flutter:\s*\^?[0-9.]+/font_awesome_flutter: ^10.7.0/' pubspec.yaml
          fi

          echo "✅ [AUTO-FIX] Patch kompatibilitas selesai."

      - name: "Auto-Fix: Missing Plugin Check"
        if: ${{ github.event.inputs.auto_fix == 'true' && github.event.inputs.fix_category == 'MISSING_PLUGIN_ERROR' }}
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          echo "=== [AUTO-FIX] Cek plugin wajib vs daftar dari GitHub ==="
          TEMPLATE_URL="${{ github.event.inputs.template_url }}"
          if [ -z "$TEMPLATE_URL" ]; then
            echo "ℹ️ Tidak ada template_url (kategori tidak ketemu di GitHub/Telegram), skip."
            exit 0
          fi

          if ! curl -fsSL "$TEMPLATE_URL" -o /tmp/plugin-list.json || [ ! -s /tmp/plugin-list.json ]; then
            echo "⚠️ Gagal ambil plugin-list.json, skip."
            exit 0
          fi

          echo "📄 Daftar plugin wajib (dari GitHub):"
          cat /tmp/plugin-list.json

          node -e '
            const fs = require("fs");
            const list = JSON.parse(fs.readFileSync("/tmp/plugin-list.json", "utf-8"));
            let pubspec = fs.readFileSync("pubspec.yaml", "utf-8");
            const depsMarker = "dependencies:";
            const idx = pubspec.indexOf(depsMarker);
            if (idx === -1) { console.log("⚠️ Tidak ketemu section dependencies:, skip."); process.exit(0); }
            let added = [];
            for (const p of list) {
              if (!p || !p.name) continue;
              const already = new RegExp("^\\s*" + p.name + "\\s*:", "m").test(pubspec);
              if (!already) added.push(p);
            }
            if (added.length === 0) { console.log("✅ Semua plugin wajib sudah terdaftar."); process.exit(0); }
            const insertAt = idx + depsMarker.length;
            const lines = added.map(p => "\n  " + p.name + ": " + (p.version || "any")).join("");
            pubspec = pubspec.slice(0, insertAt) + lines + pubspec.slice(insertAt);
            fs.writeFileSync("pubspec.yaml", pubspec);
            console.log("✅ Plugin ditambahkan: " + added.map(p => p.name).join(", "));
          '

      - name: "Auto-Fix: SDK Mismatch Check"
        if: ${{ github.event.inputs.auto_fix == 'true' && github.event.inputs.fix_category == 'SDK_MISMATCH_ERROR' }}
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          echo "=== [AUTO-FIX] Terapkan konfigurasi SDK dari GitHub ==="
          TEMPLATE_URL="${{ github.event.inputs.template_url }}"
          if [ -z "$TEMPLATE_URL" ]; then
            echo "ℹ️ Tidak ada template_url, skip."
            exit 0
          fi
          if ! curl -fsSL "$TEMPLATE_URL" -o /tmp/sdk-config.json || [ ! -s /tmp/sdk-config.json ]; then
            echo "⚠️ Gagal ambil sdk-config.json, skip."
            exit 0
          fi
          echo "📄 Konfigurasi SDK (dari GitHub):"
          cat /tmp/sdk-config.json

          GRADLE_FILE="android/app/build.gradle"
          if [ -f "$GRADLE_FILE" ]; then
            COMPILE_SDK=$(node -pe "JSON.parse(require('fs').readFileSync('/tmp/sdk-config.json','utf-8')).compileSdk")
            MIN_SDK=$(node -pe "JSON.parse(require('fs').readFileSync('/tmp/sdk-config.json','utf-8')).minSdk")
            TARGET_SDK=$(node -pe "JSON.parse(require('fs').readFileSync('/tmp/sdk-config.json','utf-8')).targetSdk")

            sed -i -E "s/(compileSdk(Version)? )[0-9]+/\1$COMPILE_SDK/" "$GRADLE_FILE"
            sed -i -E "s/(minSdk(Version)? )[0-9]+/\1$MIN_SDK/" "$GRADLE_FILE"
            sed -i -E "s/(targetSdk(Version)? )[0-9]+/\1$TARGET_SDK/" "$GRADLE_FILE"
            echo "✅ compileSdk=$COMPILE_SDK minSdk=$MIN_SDK targetSdk=$TARGET_SDK diterapkan ke $GRADLE_FILE"
          else
            echo "ℹ️ $GRADLE_FILE tidak ditemukan, skip."
          fi

      - name: Build APK
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          if [ -f "pubspec.yaml" ]; then
            flutter build apk --${{ github.event.inputs.build_type }}
          else
            GRADLE_PATH=$(find . -name "gradlew" | head -n 1)
            GRADLE_DIR=$(dirname "$GRADLE_PATH")
            cd "$GRADLE_DIR" && chmod +x gradlew
            if [ "${{ github.event.inputs.build_type }}" = "debug" ]; then
              ./gradlew assembleDebug
            else
              ./gradlew assembleRelease
            fi
          fi

      - name: Check APK Output
        run: |
          APK_FOUND=$(find $GITHUB_WORKSPACE -name "*.apk" | head -n 1)
          APK_PATH=$(echo "$APK_FOUND" | sed "s|$GITHUB_WORKSPACE/||")
          echo "PROJECT_DIR=$GITHUB_WORKSPACE" >> $GITHUB_ENV
          echo "APK_PATH=$APK_PATH" >> $GITHUB_ENV

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: flutter-${{ github.event.inputs.build_type }}-${{ github.event.inputs.tag }}
          path: ${{ env.PROJECT_DIR }}/${{ env.APK_PATH }}
          retention-days: 1
          if-no-files-found: error